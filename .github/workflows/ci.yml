name: CI/CD Pipeline

on:
  push:
    branches: [ dev, main ]

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      REGISTRY: 172.236.254.239:30880
      IMAGE_NAME: supermodel
      FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/f5863f4d-4f8f-41e6-8361-ee3a16672099

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract branch name
        shell: bash
        run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Get short SHA
        shell: bash
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Create BuildKit config for insecure HTTP Harbor
        shell: bash
        run: |
          mkdir -p /tmp/buildkit
          printf '[registry."172.236.254.239:30880"]\n  http = true\n  insecure = true\n' > /tmp/buildkit/buildkitd.toml
          echo "=== buildkitd.toml ===" && cat /tmp/buildkit/buildkitd.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          buildkitd-config: /tmp/buildkit/buildkitd.toml

      - name: Login to Harbor (manual auth for HTTP registry)
        shell: bash
        run: |
          mkdir -p ~/.docker
          AUTH=$(echo -n "${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}" | base64 -w 0)
          cat > ~/.docker/config.json << EOF
          {
            "auths": {
              "172.236.254.239:30880": {
                "auth": "${AUTH}"
              }
            }
          }
          EOF
          echo "Docker config written."
          curl -sf -u "${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}" \
            "http://172.236.254.239:30880/v2/" && echo "Harbor reachable OK" || echo "Harbor unreachable"

      - name: Build and push dev
        if: env.BRANCH_NAME == 'dev'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            172.236.254.239:30880/supermodel/supermodel:dev-${{ env.SHORT_SHA }}
            172.236.254.239:30880/supermodel/supermodel:dev-latest
          build-args: |
            NODE_ENV=development

      - name: Verify dev image pushed to Harbor
        if: env.BRANCH_NAME == 'dev'
        shell: bash
        run: |
          set -euo pipefail
          REPO_PATH="${IMAGE_NAME}/${IMAGE_NAME}"
          for tag in "dev-${SHORT_SHA}" "dev-latest"; do
            echo "Checking manifest: ${REGISTRY}/${REPO_PATH}:${tag}"
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              -u "${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}" \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              "http://${REGISTRY}/v2/${REPO_PATH}/manifests/${tag}")
            if [ "$code" != "200" ]; then
              echo "Manifest check FAILED for ${tag}, HTTP ${code}"
              exit 1
            fi
            echo "Manifest OK: ${tag} (HTTP ${code})"
          done

      - name: Update k8s/dev/deployment.yaml and push
        if: env.BRANCH_NAME == 'dev'
        shell: bash
        run: |
          set -euo pipefail
          FILE="k8s/dev/deployment.yaml"
          IMG="${REGISTRY}/${IMAGE_NAME}:dev-${SHORT_SHA}"
          sed -i -E "s#image:\s*${REGISTRY}/${IMAGE_NAME}:[^[:space:]]+#image: ${IMG}#g" "$FILE"
          git diff -- "$FILE" || true
          if git diff --quiet -- "$FILE"; then
            echo "No changes, skip commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore(ci): update dev image to dev-${SHORT_SHA} [skip ci]"
          git push origin HEAD:dev

      - name: Build and push prod
        if: env.BRANCH_NAME == 'main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            172.236.254.239:30880/supermodel/supermodel:prod-${{ env.SHORT_SHA }}
            172.236.254.239:30880/supermodel/supermodel:prod-latest
          build-args: |
            NODE_ENV=production

      - name: Notify Feishu on success
        if: success()
        shell: bash
        run: |
          curl -sS -X POST "${FEISHU_WEBHOOK}" \
            -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"✅ [SuperModel CI/CD] 构建成功\\n分支: ${BRANCH_NAME}\\nCommit: ${SHORT_SHA}\"}}"

      - name: Notify Feishu on failure
        if: failure()
        shell: bash
        run: |
          curl -sS -X POST "${FEISHU_WEBHOOK}" \
            -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"❌ [SuperModel CI/CD] 构建失败\\n分支: ${BRANCH_NAME}\\nCommit: ${SHORT_SHA}\\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}}"
