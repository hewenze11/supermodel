apiVersion: apps/v1
kind: Deployment
metadata:
  name: supermodel-dev
  namespace: dev-supermodel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supermodel-dev
  template:
    metadata:
      labels:
        app: supermodel-dev
    spec:
      containers:
      - name: supermodel
        image: 172.236.254.239:30880/supermodel/supermodel:dev-e7ee40b
        imagePullPolicy: Always
        ports:
        - containerPort: 11451
          name: inference
        - containerPort: 11435
          name: admin
        env:
        - name: NODE_ENV
          value: "development"
        - name: DATABASE_URL
          value: "postgresql://postgres:PgTest12345@172.236.224.19:5433/supermodel_test"
        - name: REDIS_URL
          value: "redis://:RedisTest12345@172.236.224.19:6380"
        - name: MEMORY_API_BASE_URL
          value: "http://172.236.254.239:31012"
        # API Keys 从 Secret 注入，Secret 名: supermodel-secrets
        - name: APIMART_API_KEY
          valueFrom:
            secretKeyRef:
              name: supermodel-secrets
              key: APIMART_API_KEY
              optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: 11451
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 11451
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
      # 不再依赖宿主机目录，配置已打进镜像
---
apiVersion: v1
kind: Service
metadata:
  name: supermodel-service-dev
  namespace: dev-supermodel
spec:
  selector:
    app: supermodel-dev
  ports:
    - protocol: TCP
      port: 11451
      targetPort: 11451
      name: inference
    - protocol: TCP
      port: 11435
      targetPort: 11435
      name: admin
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: supermodel-nodeport-dev
  namespace: dev-supermodel
spec:
  selector:
    app: supermodel-dev
  ports:
    - protocol: TCP
      port: 11451
      targetPort: 11451
      nodePort: 31004
      name: inference
  type: NodePort
