apiVersion: apps/v1
kind: Deployment
metadata:
  name: supermodel-prod
  namespace: supermodel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supermodel-prod
  template:
    metadata:
      labels:
        app: supermodel-prod
    spec:
      containers:
      - name: supermodel
        image: 172.236.254.239:30880/supermodel:prod-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 11451
          name: inference
        - containerPort: 11435
          name: admin
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          value: "postgresql://postgres:PgProd12345@172.236.224.19:5432/supermodel_prod"
        volumeMounts:
        - name: supermodel-config
          mountPath: /root/.supermodel
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 11451
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 11451
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
      volumes:
      - name: supermodel-config
        hostPath:
          path: /root/.supermodel
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: supermodel-service-prod
  namespace: supermodel
spec:
  selector:
    app: supermodel-prod
  ports:
    - protocol: TCP
      port: 11451
      targetPort: 11451
      name: inference
    - protocol: TCP
      port: 11435
      targetPort: 11435
      name: admin
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: supermodel-nodeport-prod
  namespace: supermodel
spec:
  selector:
    app: supermodel-prod
  ports:
    - protocol: TCP
      port: 11451
      targetPort: 11451
      nodePort: 31004
      name: inference
  type: NodePort
